<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdaptEduca - Entrar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="auth-wrap">
    <div class="auth-card">
      <a href="index.html" class="logo" style="justify-content:center; margin-bottom:24px;">
        <span class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span>
        AdaptEduca
      </a>

      <div class="auth-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      </div>

      <h1>Bem-vindo de volta!</h1>
      <p class="auth-sub">Entre na sua conta para continuar</p>

      <form data-form="login">
        <div class="form-group">
          <label for="login-email">E-mail</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" id="login-email" class="input" placeholder="seu@email.com" required>
          </div>
        </div>

        <div class="form-group">
          <label for="login-pwd">Senha</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="login-pwd" class="input" placeholder="••••••••" required>
          </div>
        </div>

        <div class="form-meta">
          <label><input type="checkbox"> Lembrar de mim</label>
          <a href="#">Esqueceu a senha?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block">Entrar</button>
      </form>

      <p class="auth-foot">Não tem uma conta? <a href="cadastrar.html">Cadastre-se</a></p>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
